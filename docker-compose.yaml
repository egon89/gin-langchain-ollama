services:
  tika:
    image: apache/tika:2.9.1.0
    container_name: tika-server
    ports:
      - "9998:9998"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9998/version"]
      interval: 10s
      timeout: 5s
      retries: 5

  db:
    container_name: postgres-vector-go
    image: 'pgvector/pgvector:pg17-trixie'
    environment:
      - POSTGRES_DB
      - POSTGRES_PASSWORD
      - POSTGRES_USER
    ports:
      - '5432:5432'

volumes:
  pgdatago:
